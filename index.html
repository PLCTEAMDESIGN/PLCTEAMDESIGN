<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>PLC TEAM DESIGN | Bad Oeynhausen</title> 
    <meta name="google-site-verification" content="hXvCe_t1mEstDom0kluGGE9olJTBmsdgksjMmIZRnKs" /> 
    
    <style> 
        /* GLOBALE STILE - UNVERÄNDERT */
        * { box-sizing: border-box !important; }
        :root { 
            --primary-purple: #741fa2; --dark-purple: #4a0072; --deep-background: #1e0034; 
            --gold-accent: #d4af37; --light-bg: #fdfbfe; --text-dark: #111111; 
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); 
        } 
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background-color: var(--light-bg); overflow-x: hidden; scroll-behavior: smooth; } 

        /* SIDEBAR - UNVERÄNDERT */
        .sidebar-nav { 
            width: 250px !important; height: 100vh !important; background-color: #ffffff !important; 
            border-right: 6px solid var(--gold-accent) !important; position: fixed; top: 0; left: 0; 
            display: flex !important; flex-direction: column !important; align-items: center !important; padding: 1.5rem 1rem !important; z-index: 1000; 
        } 
        
        .logo-box {
            background: #ffffff !important; border: 6px solid var(--gold-accent) !important; 
            width: 218px !important; height: 130px !important; border-radius: 4px !important;
            display: flex !important; flex-direction: column !important; align-items: center !important; margin-bottom: 1.5rem !important; cursor: pointer;
        }
        .logo-box:hover { background-color: var(--primary-purple) !important; }
        .sidebar-logo { width: 100%; height: auto; object-fit: contain; }

        .nav-btn {
            display: flex !important; align-items: center !important; justify-content: center !important;
            width: 218px !important; height: 52px !important; background: #ffffff !important; 
            border: 6px solid var(--gold-accent) !important; border-radius: 4px !important;
            margin-bottom: 1rem !important; text-decoration: none !important; color: var(--text-dark) !important; font-weight: bold !important;
        } 
        .nav-btn:hover { background-color: var(--primary-purple) !important; color: #ffffff !important; }

        /* CONTENT BEREICH */
        .main-content { margin-left: 250px; flex: 1; min-width: 0; } 
        header { background: linear-gradient(135deg, var(--dark-purple), var(--primary-purple)) !important; padding: 4rem 1rem; text-align: center; border-bottom: 6px solid var(--gold-accent); color: white; }
        .container { max-width: 1100px; margin: 4rem auto; padding: 0 2rem; }

        /* DER GRÜNE KREIS (BASIS FÜR SKALIERUNG) */
        .status-circle {
            width: 2.5vw; height: 2.5vw; min-width: 15px; min-height: 15px;
            background-color: #00ff00; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px #00ff00; margin-bottom: 1.5rem;
        }

        /* PROJEKT BEREICH 1 (STICKY/VORDERGRUND) */
        .project-1-focus {
            position: sticky; top: 20px; z-index: 500;
            background: #ffffff; border: 6px solid var(--gold-accent);
            padding: 1.5rem; margin-bottom: 4rem; border-radius: 4px;
            box-shadow: var(--card-shadow);
        }

        /* PROJEKT BEREICH 2-8 (AN KREIS-GRÖSSE ANGEPASST) */
        .projekte-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(calc(150px + 5vw), 1fr)); 
            gap: 2rem;
        }
        .project-card {
            background: #ffffff; border-top: 6px solid var(--primary-purple);
            padding: 1.2rem; box-shadow: var(--card-shadow); transition: 0.3s;
        }
        .project-card:hover { transform: translateY(-5px); background: var(--primary-purple); color: white; }
        .project-card img { width: 100%; border-radius: 4px; }

        @media (max-width: 768px) {
            .sidebar-nav { width: 100% !important; height: auto !important; position: relative; border-right: none; border-bottom: 6px solid var(--gold-accent); }
            .main-content { margin-left: 0; }
            .project-1-focus { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <div class="sidebar-nav">
        <div class="logo-box" onclick="location.href='https://plc-team-design.de'">
            <img src="shop-logo.png" class="sidebar-logo">
            <div style="text-align: center;">
                <span style="display:block; font-weight:bold; font-size:1.2rem;">+</span>
                <span style="font-weight:bold; text-transform:uppercase; font-size:0.9rem;">Online Shop</span>
            </div>
        </div>
        <a href="#projekte" class="nav-btn">PROJEKTE</a>
        <a href="#leistungen" class="nav-btn">LEISTUNGEN</a>
        <a href="#kontakt" class="nav-btn">KONTAKT</a>
    </div>

    <div class="main-content">
        <header>
            <img src="logo.png" style="max-width:80%; height:auto; display:block; margin: 0 auto;">
        </header>

        <div class="container">
            <!-- GRÜNER KREIS -->
            <div class="status-circle"></div>

            <!-- PROJEKT BEREICH 1 (UNABHÄNGIG) -->
            <div class="project-1-focus">
                <h2 style="color: var(--primary-purple); margin-top:0;">Projekt 1: Fokus-Konstruktion</h2>
                <img src="projekt1.jpg" style="width:100%; border-radius:4px; max-height:400px; object-fit:cover;">
                <p>Eigenständige Darstellung ohne Text-Abhängigkeit.</p>
            </div>

            <!-- PROJEKT BEREICH 2-8 -->
            <div id="projekte" class="projekte-grid">
                <div class="project-card"><img src="projekt2.jpg"><h3>Projekt 2</h3></div>
                <div class="project-card"><img src="projekt3.jpg"><h3>Projekt 3</h3></div>
                <div class="project-card"><img src="projekt4.jpg"><h3>Projekt 4</h3></div>
                <div class="project-card"><img src="projekt1.jpg"><h3>Projekt 5</h3></div>
                <div class="project-card"><img src="projekt2.jpg"><h3>Projekt 6</h3></div>
                <div class="project-card"><img src="projekt3.jpg"><h3>Projekt 7</h3></div>
                <div class="project-card"><img src="projekt4.jpg"><h3>Projekt 8</h3></div>
            </div>
        </div>
    </div>

</body>
</html>
