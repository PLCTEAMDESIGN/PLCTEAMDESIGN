<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>PLC TEAM DESIGN | Bad Oeynhausen</title> 
    <!-- GOOGLE-VERIFIZIERUNGSCODE --> 
    <meta name="google-site-verification" content="hXvCe_t1mEstDom0kluGGE9olJTBmsdgksjMmIZRnKs" /> 
    <style> 
        :root { 
            --primary-purple: #741fa2; 
            --dark-purple: #4a0072; 
            --deep-background: #1e0034; 
            --gold-accent: #d4af37; 
            --light-bg: #fdfbfe; 
            --text-dark: #111111; 
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); 
            --hover-soft: #f5f0fa; 
        } 
        
        /* 1. GESPERRTER BEREICH: GRUNDLAYOUT PC & HANDY */ 
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; margin: 0; padding: 0; 
            color: var(--text-dark); background-color: var(--light-bg); 
            display: flex; overflow-x: hidden; 
        } 
        .sidebar-nav { 
            width: 250px; height: 100vh; 
            background-color: var(--deep-background); 
            border-right: 3px solid var(--gold-accent); 
            position: fixed; top: 0; left: 0; 
            display: flex; flex-direction: column; 
            padding: 1.5rem 1rem; box-sizing: border-box; z-index: 1000; 
        } 
        .main-content { margin-left: 250px; flex: 1; min-width: 0; } 
        .container { max-width: 1100px; margin: 4rem auto; padding: 0 2rem; box-sizing: border-box; } 
        
        @media (max-width: 768px) { 
            body { flex-direction: column; } 
            .sidebar-nav { width: 100%; height: auto; position: relative; border-right: none; padding: 1rem; } 
            .main-content { margin-left: 0; } 
            .section-title { font-size: 2rem; } 
        } 
        /* GESPERRTER BEREICH ENDE */ 
        
        /* 2. GESPERRTER BEREICH: HEADER & BANNER */ 
        header { 
            background: linear-gradient(135deg, var(--dark-purple), var(--primary-purple)); 
            color: white; padding: 4rem 1rem; text-align: center; 
            border-bottom: 5px solid var(--gold-accent); 
        } 
        .logo-img { 
            width: 100%; max-width: 800px; height: auto; 
            display: block; margin: 0 auto 2rem auto; background: transparent; 
            filter: drop-shadow(3px 0px 0px #ffffff) drop-shadow(-3px 0px 0px #ffffff) drop-shadow(0px 3px 0px #ffffff) drop-shadow(0px -3px 0px #ffffff); 
        } 
        /* GESPERRTER BEREICH ENDE */ 
        
        /* INHALTSBEREICH: TEXTE & ÜBERSCHRIFTEN */ 
        .section-title { 
            font-size: 2.3rem; font-weight: 800; 
            color: var(--primary-purple); margin-bottom: 0.5rem; 
            text-align: left; line-height: 1.2; 
        } 
        .section-subtitle { 
            font-size: 1.1rem; color: #444444; 
            margin-bottom: 3.5rem; text-align: left; 
            font-weight: 500; max-width: 900px; line-height: 1.6; 
        } 
        
        /* DIENSTLEISTUNGS-KARTEN (FLÄCHE WEISS) */ 
        .horizontal-scroll-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); 
            gap: 1.2rem; margin-bottom: 4rem; text-align: left; 
        } 
        .koerber-card { 
            background: #ffffff; 
            border-radius: 4px; min-height: 280px; 
            border-top: 4px solid var(--primary-purple); 
            padding: 1.2rem; box-shadow: var(--card-shadow); 
            transition: all 0.3s ease; 
        } 
        .koerber-card:hover { 
            transform: translateY(-5px); 
            background-color: var(--hover-soft); 
            border-top-color: var(--gold-accent); 
        } 
        .koerber-card h3 { font-size: 1.1rem; font-weight: 700; color: var(--dark-purple); margin-top: 0; } 
        .koerber-card p { font-size: 0.85rem; color: #444444; margin: 0; line-height: 1.5; } 
        
        /* PROJEKTE & KETTEN-ANIMATION NR. 1 */ 
        .projects-section { margin-top: 5rem; text-align: left; } 
        .project-featured { 
            width: 100%; text-align: center; margin-bottom: 3rem; 
            padding: 2rem 0; background: transparent; box-sizing: border-box; 
            position: relative; overflow: hidden; height: 350px; 
        } 
        .project-featured-img-wrapper { 
            width: 250px; height: 250px; position: absolute; 
            top: 50px; left: 0; display: flex; 
            justify-content: center; align-items: center; 
            animation: infinite-pass-through 12s linear infinite; 
        } 
        .project-featured-img { 
            width: 100%; height: 100%; object-fit: contain; 
            animation: rotate-ccw 10s linear infinite; 
        } 
        @keyframes rotate-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } } 
        @keyframes infinite-pass-through { 0% { left: -250px; } 100% { left: 100%; } } 
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-top: 2rem; } 
        .project-card { 
            background: #ffffff; border: 1px solid #eeeeee; 
            border-radius: 4px; overflow: hidden; 
            box-shadow: var(--card-shadow); transition: all 0.3s ease; 
        } 
        .project-card:hover { transform: scale(1.02); background-color: var(--hover-soft); } 
        .project-img-wrapper { width: 100%; height: 250px; overflow: hidden; } 
        .project-img { width: 100%; height: 100%; object-fit: contain; padding: 0.5rem; box-sizing: border-box; } 
        .project-title { padding: 1rem; margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-dark); border-top: 1px solid #f0f0f0; background: #fafafa; } 
        
        @media (max-width: 768px) { 
            .project-featured-img-wrapper { animation: none; position: relative; margin: 0 auto; top: 0; left: auto; } 
            .project-featured { height: auto; overflow: visible; } 
            .project-featured-img-wrapper { width: 200px; height: 200px; } 
        } 
        
        /* 3. GESPERRTER BEREICH: KONTAKT & FOOTER MIT IMPRESSUM */ 
        .contact-section { 
            background: var(--dark-purple); color: white; 
            padding: 3rem 2.5rem; border-radius: 4px; 
            margin-top: 6rem; text-align: left; 
            border-left: 6px solid var(--gold-accent); 
        } 
        .contact-section a { 
            color: #ffffff !important; 
            text-decoration: underline; font-weight: bold; 
        } 
        footer { 
            background: var(--deep-background); color: #c2b4d6; 
            padding: 4rem 1.5rem; border-top: 4px solid var(--gold-accent); 
            text-align: left; 
        } 
        .footer-container { max-width: 900px; margin: 0 auto; } 
        
        /* Klappmenü für Rechtstexte */ 
        .accordion-item { border-bottom: 1px solid #3c1963; } 
        .accordion-trigger { 
            width: 100%; background: none; border: none; 
            text-align: left; color: #ffffff; font-size: 1.1rem; 
            font-weight: 600; padding: 1.2rem 0; cursor: pointer; 
            display: flex; justify-content: space-between; 
        } 
        .accordion-content a, .legal-text a { 
            color: #ffffff !important; 
            text-decoration: underline; 
        }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; } 
        .accordion-item.active .accordion-content { max-height: 500px; } 
        .legal-text { padding: 0.5rem 0 1.5rem 0; color: #c2b4d6; font-size: 0.95rem; } 
        .footer-copyright { text-align: center; font-size: 0.85rem; color: #7c6894; margin-top: 2rem; } 
        /* GESPERRTER BEREICH ENDE */ 
    </style>
</head>
<body>

    <div class="sidebar-nav">

    </div>
</body>
</html>
