<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>PLC TEAM DESIGN | Bad Oeynhausen</title> 
    <meta name="google-site-verification" content="hXvCe_t1mEstDom0kluGGE9olJTBmsdgksjMmIZRnKs" /> 
    
    <style> 
        /* --- IHR ORIGINAL-CODE (BEIBEHALTEN) --- */
        * { box-sizing: border-box !important; }
        :root { 
            --primary-purple: #741fa2; --dark-purple: #4a0072; --gold-accent: #d4af37; 
            --light-bg: #fdfbfe; --text-dark: #111111; --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); 
        } 
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; background-color: var(--light-bg); } 
        
        .sidebar-nav { 
            width: 250px !important; height: 100vh !important; background-color: #ffffff !important; 
            border-right: 6px solid var(--gold-accent) !important; position: fixed; top: 0; left: 0; 
            display: flex !important; flex-direction: column !important; align-items: center !important; padding: 1.5rem 1rem !important; z-index: 1000; 
        } 
        
        .logo-box {
            background: #ffffff !important; border: 6px solid var(--gold-accent) !important; 
            width: 218px !important; height: 130px !important; border-radius: 4px !important;
            display: flex !important; flex-direction: column !important; align-items: center !important; margin-bottom: 1.5rem !important;
        }
        .logo-box:hover { background-color: var(--primary-purple) !important; }

        .sidebar-nav a.nav-btn {
            display: flex !important; align-items: center !important; justify-content: center !important;
            width: 218px !important; height: 52px !important; background: #ffffff !important; 
            border: 6px solid var(--gold-accent) !important; border-radius: 4px !important;
            margin-bottom: 1rem !important; text-decoration: none !important; color: var(--text-dark) !important; font-weight: bold !important;
        } 
        .sidebar-nav a.nav-btn:hover { background-color: var(--primary-purple) !important; color: #ffffff !important; }

        .main-content { margin-left: 250px; flex: 1; } 
        header { background: linear-gradient(135deg, var(--dark-purple), var(--primary-purple)) !important; padding: 4rem 1rem; text-align: center; border-bottom: 6px solid var(--gold-accent); color: white; }
        .container { max-width: 1100px; margin: 4rem auto; padding: 0 2rem; }

        /* --- NEUE ANPASSUNGEN (ERGÄNZT) --- */
        
        /* 1. Grüner Kreis (Größe abhängig vom Bildschirm) */
        .status-circle {
            width: 2.5vw; height: 2.5vw; min-width: 18px; min-height: 18px;
            background-color: #2ecc71; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px #2ecc71; margin-right: 10px;
        }

        /* 2. Projekt 1 Sticky (Pflicht-Vordergrund) */
        .project-1-sticky {
            position: -webkit-sticky; position: sticky; top: 20px;
            z-index: 500; background: white; border: 4px solid var(--gold-accent);
            padding: 1.5rem; margin-bottom: 3rem; border-radius: 4px; box-shadow: var(--card-shadow);
        }

        /* 3. Projekte 2-8 Raster (Fortlaufend) */
        .projekte-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem; margin-top: 2rem;
        }
        .koerber-card { 
            background: #ffffff; border-top: 6px solid var(--primary-purple); 
            padding: 1.2rem; box-shadow: var(--card-shadow); transition: 0.3s;
        }
        .koerber-card:hover { background-color: var(--primary-purple); color: white; transform: translateY(-5px); }
        .koerber-card img { width: 100%; border-radius: 4px; }

        @media (max-width: 768px) {
            .sidebar-nav { width: 100% !important; height: auto !important; position: relative; border-right: none; border-bottom: 6px solid var(--gold-accent); }
            .main-content { margin-left: 0; }
            .project-1-sticky { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <div class="sidebar-nav">
        <div class="logo-box" onclick="location.href='https://plc-team-design.de'">
            <img src="shop-logo.png" style="width:80%; margin-top:10px;">
            <div class="shop-text-wrapper">
                <div class="shop-plus">+</div>
                <div class="shop-text">Online Shop</div>
            </div>
        </div>
        <a href="#projekte" class="nav-btn">PROJEKTE</a>
        <a href="#leistungen" class="nav-btn">LEISTUNGEN</a>
        <a href="#kontakt" class="nav-btn">KONTAKT</a>
    </div>

    <div class="main-content">
        <header>
            <img src="logo.png" style="max-width:80%; height:auto;">
        </header>

        <div class="container">
            <div style="display: flex; align-items: center; margin-bottom: 2rem;">
                <div class="status-circle"></div>
                <h2 style="margin:0; color: var(--primary-purple);">Status: Projekt-Modus Aktiv</h2>
            </div>

            <!-- Projekt 1: Pflicht / Sticky -->
            <div class="project-1-sticky">
                <h3>PROJEKT 1 (Im Vordergrund)</h3>
                <img src="projekt1.jpg" style="width:100%; max-height:350px; object-fit:cover; border-radius:4px;">
                <p>Dieses Projekt bleibt beim Scrollen präsent.</p>
            </div>

            <!-- Projekte 2 bis 8 -->
            <div id="projekte" class="projekte-grid">
                <div class="koerber-card"><img src="projekt2.jpg"><h3>Projekt 2</h3></div>
                <div class="koerber-card"><img src="projekt3.jpg"><h3>Projekt 3</h3></div>
                <div class="koerber-card"><img src="projekt4.jpg"><h3>Projekt 4</h3></div>
                <div class="koerber-card"><img src="projekt2.jpg"><h3>Projekt 5</h3></div>
                <div class="koerber-card"><img src="projekt3.jpg"><h3>Projekt 6</h3></div>
                <div class="koerber-card"><img src="projekt4.jpg"><h3>Projekt 7</h3></div>
                <div class="koerber-card"><img src="projekt1.jpg"><h3>Projekt 8</h3></div>
            </div>
        </div>
    </div>

</body>
</html>
